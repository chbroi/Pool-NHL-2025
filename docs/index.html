<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pool des Séries NHL</title>

  <style>

    /* ===== THEME ===== */
    :root {
      --bg: #f5f7fb;
      --text: #333;
      --card: white;
      --primary: #007BFF;
    }

    body[data-theme="dark"] {
      --bg: #121212;
      --text: #e0e0e0;
      --card: #1e1e1e;
      --primary: #4dabf7;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ===== NAVBAR ===== */
    #topBar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      background: var(--card);
      border-bottom: 1px solid rgba(0,0,0,0.1);
    }

    #tabs {
      display: flex;
      gap: 8px;
    }

    #tabs button {
      border: none;
      background: transparent;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      color: var(--text);
      font-weight: 500;
    }

    #tabs button:hover {
      background: rgba(0,0,0,0.05);
    }

    #tabs button.activeTab {
      background: var(--primary);
      color: white;
    }

    /* ===== DARK BUTTON ===== */
    #themeToggle {
      border: none;
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      background: var(--card);
      border: 1px solid rgba(0,0,0,0.1);
    }

    #themeToggle:hover {
      background: var(--primary);
      color: white;
    }

    /* ===== HEADER ===== */
    #mainHeader {
      text-align: center;
      padding: 40px 20px;
      font-size: 26px;
      font-weight: 600;
      background: linear-gradient(135deg, #1e1e1e, #2c3e50);
      color: white;
    }

    /* ===== CONTENT ===== */
    #homeTab, #submitTab, #resultsTab, #leaderboardTab,
    #rulesTab, #myPicksTab {
      max-width: 1000px;
      margin: 20px auto;
      padding: 10px;
    }

    /* ===== CARDS ===== */
    .section, .card {
      background: var(--card);
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 16px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.05);
    }

    .matchup {
      background: var(--card);
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
    }

    /* ===== TABLE ===== */
    .resultsTable {
      width: 100%;
      border-collapse: collapse;
    }

    .resultsTable th {
      background: var(--primary);
      color: white;
      padding: 10px;
    }

    .resultsTable td {
      padding: 8px;
      border-bottom: 1px solid #eee;
      text-align: center;
    }

    .resultsTable tr:hover {
      background: rgba(0,0,0,0.05);
    }

    /* ===== BUTTON ===== */
    button {
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-1px);
    }

  </style>

</head>

<body data-theme="light">

  <!-- NAVBAR -->
  <div id="topBar">

    <div id="tabs">
      <button onclick="showTab('home')">Accueil</button>
      <button onclick="showTab('submit')">Soumettre</button>
      <button onclick="showTab('myPicks')">Mes prédictions</button>
      <button onclick="showTab('results')">Résultats</button>
      <button onclick="showTab('leaderboard')">Classement</button>
      <button onclick="showTab('rules')">Règlements</button>
    </div>

    <button id="themeToggle">🌙</button>

  </div>

  <!-- HEADER -->
  <div id="mainHeader">
    🏒 Pool des séries éliminatoires de la LNH
  </div>

  <!-- LOGIN -->
  <div id="loginContainer">
    <button id="loginBtn">Connexion</button>
    <button id="logoutBtn" style="display:none;">Déconnexion</button>
    <p id="userInfo"></p>
  </div>

  <!-- APP -->
  <div id="appContent" style="display:none;">

    <div id="homeTab"></div>
    <div id="submitTab" style="display:none;"></div>
    <div id="myPicksTab" style="display:none;"></div>
    <div id="resultsTab" style="display:none;"></div>
    <div id="leaderboardTab" style="display:none;"></div>
    <div id="rulesTab" style="display:none;"></div>

    <div id="helperMessage"></div>

  </div>

  <script type="module" src="js/main.js"></script>

</body>
</html>
